<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Pattern: Sidebar + Main Content</title>
  <style>
    /* ==========================================================================
       CSS Variables - Design Tokens
       ========================================================================== */
    :root {
      /* Colors */
      --cream: #faf6f1;
      --sand: #e8dcc8;
      --sand-light: #f0e8dc;
      --sand-dark: #d4c4a8;
      --terracotta: #d4735a;
      --salmon: #e8a091;
      --teal: #7cc5c0;
      --teal-dark: #5ba8a3;
      --text: #3a3a3a;
      --text-light: #666;

      /* Layout */
      --sidebar-width: 260px;
      --container-width: 900px;
      --container-radius: 12px;
      --outline-width: 6px;
    }

    /* ==========================================================================
       Reset & Base
       ========================================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #fef9f5 0%, #f5ede4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ==========================================================================
       Container - The outer wrapper
       ========================================================================== */
    .container {
      position: relative;
      display: flex;
      width: var(--container-width);
      max-width: calc(100vw - 40px);
      min-height: 540px;
      border-radius: var(--container-radius);
    }

    /* Background + shadow layer */
    .container::before {
      content: '';
      position: absolute;
      top: calc(-1 * var(--outline-width));
      left: calc(-1 * var(--outline-width));
      right: calc(-1 * var(--outline-width));
      bottom: calc(-1 * var(--outline-width));
      background: var(--cream);
      border-radius: calc(var(--container-radius) + var(--outline-width));
      box-shadow:
        0 8px 32px rgba(139, 90, 60, 0.15),
        0 2px 8px rgba(139, 90, 60, 0.1);
      z-index: -1;
    }

    /* ==========================================================================
       Sidebar (Index)
       ========================================================================== */
    .sidebar {
      flex: 0 0 var(--sidebar-width);
      padding: 24px 20px;
      background: linear-gradient(180deg, rgba(232, 160, 145, 0.15) 0%, rgba(245, 230, 211, 0.3) 100%);
      display: flex;
      flex-direction: column;
      border-radius: var(--container-radius) 0 0 var(--container-radius);
      position: relative;
      overflow: visible;
      user-select: none;
    }

    /* Sidebar title */
    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      opacity: 0.55;
      margin-bottom: 16px;
    }

    /* Divider line */
    .sidebar-divider {
      height: 1px;
      background: rgba(180, 160, 140, 0.3);
      margin: 12px -20px;
    }

    /* ==========================================================================
       Highlighter - Animated background behind active item
       ========================================================================== */
    .highlighter {
      position: absolute;
      left: -20px;
      top: 0;
      right: 8px;
      height: 42px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 21px 8px 8px 21px;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transform: scale(1);
      transform-origin: right center;
      transition:
        top 0.35s ease-in-out,
        height 0.35s ease-in-out,
        opacity 0.2s ease,
        transform 0.2s ease-out,
        box-shadow 0.2s ease-out;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .highlighter.active {
      opacity: 1;
    }

    /* Scale up on hover */
    .sidebar:has(.nav-item.active:hover) .highlighter {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    /* Navigation items */
    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      z-index: 1;
    }

    .nav-item:hover:not(.active) {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Status indicator */
    .nav-item .status {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--sand-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
      flex-shrink: 0;
      transition: all 0.35s ease-out;
    }

    .nav-item.active .status {
      background: var(--teal);
      transform: translateX(-42px) scale(1.15);
    }

    .nav-item.complete .status {
      background: var(--terracotta);
    }

    /* Label */
    .nav-item .label {
      font-size: 13px;
      color: var(--text);
      transition: all 0.35s ease-out;
    }

    .nav-item.active .label {
      font-weight: 600;
      transform: translateX(-36px);
    }

    /* Section header */
    .nav-section {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 12px 6px;
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    /* Footer info */
    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(180, 160, 140, 0.3);
      position: relative;
      z-index: 1;
    }

    .sidebar-footer .org-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .sidebar-footer .org-code {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ==========================================================================
       Main Content
       ========================================================================== */
    .content {
      flex: 1;
      min-width: 0;
      padding: 20px 40px 20px 20px;
      display: flex;
      flex-direction: column;
    }

    /* Header area */
    .content-header {
      flex-shrink: 0;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(212, 196, 168, 0.33);
    }

    .content-header .nav-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Scrollable content area */
    .content-body {
      flex: 1;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
      padding-right: 20px;
      /* Hide scrollbar for clean look */
      scrollbar-width: thin;
      scrollbar-color: var(--salmon) transparent;
    }

    .content-body::-webkit-scrollbar {
      width: 4px;
    }

    .content-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-body::-webkit-scrollbar-thumb {
      background: var(--salmon);
      border-radius: 2px;
    }

    /* Content title */
    .content-body h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .content-body .subtitle {
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Footer area */
    .content-footer {
      flex-shrink: 0;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(212, 196, 168, 0.33);
    }

    .content-footer .nav-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ==========================================================================
       Buttons
       ========================================================================== */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--terracotta);
      color: white;
    }

    .btn-primary:hover {
      background: #c4634a;
    }

    .btn-secondary {
      background: var(--sand);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--sand-dark);
    }

    /* ==========================================================================
       Form Elements (example)
       ========================================================================== */
    .form-section {
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .field input[type="text"],
    .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--sand-dark);
      border-radius: 6px;
      font-size: 14px;
      background: white;
      transition: border-color 0.2s;
    }

    .field input[type="text"]:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--teal);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar">
      <!-- Highlighter element - moves behind active item -->
      <div class="highlighter" id="highlighter"></div>

      <h2 class="sidebar-title">Titel Applicatie</h2>
      <div class="sidebar-divider"></div>

      <nav class="sidebar-nav" id="sidebarNav">
        <div class="nav-item active" data-step="0">
          <span class="status"></span>
          <span class="label">Welkom</span>
        </div>
        <div class="nav-item complete" data-step="1">
          <span class="status">&#10003;</span>
          <span class="label">Stap 1</span>
        </div>
        <div class="nav-item" data-step="2">
          <span class="status"></span>
          <span class="label">Stap 2</span>
        </div>

        <div class="nav-section">Sectie B</div>

        <div class="nav-item" data-step="3">
          <span class="status"></span>
          <span class="label">Stap 3</span>
        </div>
        <div class="nav-item" data-step="4">
          <span class="status"></span>
          <span class="label">Stap 4</span>
        </div>
        <div class="nav-item" data-step="5">
          <span class="status"></span>
          <span class="label">Stap 5</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="org-name">Organisatie Naam</div>
        <div class="org-code">CODE-123</div>
      </div>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="content">
      <header class="content-header">
        <div class="nav-buttons">
          <button class="btn btn-secondary">Vorige</button>
          <button class="btn btn-primary">Volgende</button>
        </div>
      </header>

      <div class="content-body">
        <h1>Welkom</h1>
        <p class="subtitle">Dit is een korte introductie tekst die uitlegt waar deze stap over gaat.</p>

        <div class="form-section">
          <div class="field">
            <label>Naam organisatie</label>
            <input type="text" placeholder="Voer naam in...">
          </div>
          <div class="field">
            <label>Omschrijving</label>
            <textarea rows="4" placeholder="Voer omschrijving in..."></textarea>
          </div>
        </div>
      </div>

      <footer class="content-footer">
        <div class="nav-buttons">
          <button class="btn btn-secondary">Vorige</button>
          <button class="btn btn-primary">Volgende</button>
        </div>
      </footer>
    </main>
  </div>

  <script>
    /* ==========================================================================
       Highlighter Logic
       ========================================================================== */
    const highlighter = document.getElementById('highlighter');
    const sidebar = document.querySelector('.sidebar');
    const navItems = document.querySelectorAll('.nav-item');
    let initialized = false;

    /**
     * Update highlighter position to match active item
     */
    function updateHighlighter() {
      const activeItem = document.querySelector('.nav-item.active');
      if (!activeItem || !highlighter || !sidebar) return;

      const sidebarRect = sidebar.getBoundingClientRect();
      const itemRect = activeItem.getBoundingClientRect();
      const topPosition = itemRect.top - sidebarRect.top;

      // First time: no animation
      if (!initialized) {
        highlighter.style.transition = 'none';
        highlighter.style.top = topPosition + 'px';
        highlighter.style.height = itemRect.height + 'px';
        highlighter.offsetHeight; // Force reflow
        highlighter.style.transition = '';
        initialized = true;
      } else {
        highlighter.style.top = topPosition + 'px';
        highlighter.style.height = itemRect.height + 'px';
      }

      highlighter.classList.add('active');
    }

    /**
     * Set active item and update highlighter
     */
    function setActiveItem(item) {
      navItems.forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      updateHighlighter();
    }

    // Click handlers for nav items
    navItems.forEach(item => {
      item.addEventListener('click', () => setActiveItem(item));
    });

    // Initialize on load
    updateHighlighter();
  </script>

</body>
</html>
