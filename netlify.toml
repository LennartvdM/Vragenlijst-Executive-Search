# Netlify configuration for Monitoring Cultureel Talent naar de Top

[build]
  command = "npm run build && npm run build:html"
  publish = "."

# Proxy API calls to Google Apps Script to avoid CORS issues
# Query parameters are forwarded automatically for status 200 proxies.
# Two rules needed: /api/ (exact) and /api/* (sub-paths) because the
# wildcard * requires at least one character and won't match /api/?query=...
[[redirects]]
  from = "/api/"
  to = "https://script.google.com/macros/s/AKfycbw4ZABLfBqi4_l_zcSBnSqP9UgmJsRk3RLjMoF42p55kG-AefL1QgYo2G4Fnlfh1qf7WQ/exec"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://script.google.com/macros/s/AKfycbw4ZABLfBqi4_l_zcSBnSqP9UgmJsRk3RLjMoF42p55kG-AefL1QgYo2G4Fnlfh1qf7WQ/exec/:splat"
  status = 200
  force = true

# Serve index.html for /inkijkexemplaar so it works as a direct URL
[[redirects]]
  from = "/inkijkexemplaar"
  to = "/index.html"
  status = 200
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://script.google.com; img-src 'self' data:; frame-ancestors 'none'"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# No aggressive caching during development - let browser check for updates
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
