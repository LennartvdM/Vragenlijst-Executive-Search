# Netlify configuration for Monitoring Cultureel Talent naar de Top

[build]
  command = "npm run build && npm run build:html"
  publish = "."

# Proxy API calls to Google Apps Script to avoid CORS issues
# Query parameters are passed through automatically with status 200 proxies
[[redirects]]
  from = "/api/*"
  to = "https://script.google.com/macros/s/AKfycbw3gcRqlbc9lH0WKiR5yEeM4whu_WFVAUg9lE8cf9Uyf6C-teYRfA5CQX2tCaZZiV-nlg/exec/:splat"
  status = 200
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# No aggressive caching during development - let browser check for updates
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
